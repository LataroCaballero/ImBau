# SOPS creation rules (INFRA-03).
#
# Binds every encrypted secrets file (secrets/*.enc.yaml) to the project's age
# recipient. SOPS picks this recipient automatically on `sops -e`, so we never
# pass `--age` on the command line.
#
# IMPORTANT — the `age:` value below is a PLACEHOLDER. In Task 2 (the human-action
# checkpoint) you MUST replace it with the REAL age PUBLIC key produced by
# `age-keygen -o keys.txt` (the line printed as `# public key: age1...`, or the
# first non-comment line of the keyfile). The matching PRIVATE key is loaded as
# the `SOPS_AGE_KEY` GitHub Actions secret and at ~/.config/sops/age/keys.txt on
# the VPS — it is NEVER committed.
#
# Only the encrypted *.enc.yaml files are committed. The decrypted runtime .env
# (produced by deploy.sh, plan 04-06) is gitignored and must never be committed.
creation_rules:
  - path_regex: .*\.enc\.yaml$
    # TODO(Task 2): replace with your real age public key (age1...).
    age: age15tjqs56t2nh3t5vs9slq7hkwlhl5rj97uxyp9vzdmsl9kjul85qq0ktgv0
