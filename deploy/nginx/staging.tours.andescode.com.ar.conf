# deploy/nginx/staging.tours.andescode.com.ar.conf — host-nginx vhost for ImBau staging.
#
# APPLIED BY HAND on the VPS in plan 04-07 (the host nginx is SHARED with live prod sites — it
# owns :80/:443). This file is ADDED to /etc/nginx/sites-available + symlinked; EXISTING vhosts
# are NEVER touched. `nginx -t` then `systemctl reload nginx` happen on the box, not here.
#
# TLS: one SAN cert covering BOTH subdomains, issued via certbot's WEBROOT authenticator:
#   certbot certonly --webroot -w /var/www/certbot \
#     -d staging.tours.andescode.com.ar -d panel.staging.tours.andescode.com.ar \
#     --non-interactive --agree-tos -m <admin-email>
# NEVER use `certbot --nginx` — it rewrites server blocks and would mutate the prod vhosts.
# Renewal: the existing certbot.timer renews all certs; add a deploy-hook to reload nginx.
#
# ⚠ TWO DNS A RECORDS REQUIRED (prerequisite, flagged in 04-07):
#     staging.tours.andescode.com.ar        -> 31.97.175.128
#     panel.staging.tours.andescode.com.ar  -> 31.97.175.128
#
# Backends are the loopback-published Compose app containers (deploy/compose.staging.yml):
#     web   -> 127.0.0.1:8090     panel -> 127.0.0.1:8091

# ---- HTTP :80 — ACME challenge + redirect to https (both subdomains) ----
server {
    listen 80;
    listen [::]:80;
    server_name staging.tours.andescode.com.ar panel.staging.tours.andescode.com.ar;

    # certbot --webroot writes the challenge token here; must be served over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: permanent redirect to https.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — web (public showroom) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name staging.tours.andescode.com.ar;

    # Single SAN cert (covers web + panel); issued via webroot above.
    ssl_certificate     /etc/letsencrypt/live/staging.tours.andescode.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.tours.andescode.com.ar/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8090; # web container loopback bind
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # SSE route — NOT active until phase 2 (explorador, Postgres LISTEN/NOTIFY). Pre-documented so
    # the vhost is SSE-ready; apply ONLY to the specific stream path, never to `location /`.
    # location /api/stream/ {
    #     proxy_pass http://127.0.0.1:8090;
    #     proxy_http_version 1.1;
    #     proxy_set_header Connection '';
    #     proxy_buffering off;          # critical: do not buffer the event stream
    #     proxy_cache off;
    #     proxy_read_timeout 3600s;     # keep the long-lived stream open
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Edge rate-limit for anonymous events/leads inserts — DEFERRED (future milestone; those
    # tables do not exist yet). When they land, declare a zone in the http{} context, e.g.
    #   limit_req_zone $binary_remote_addr zone=ingest:10m rate=10r/s;
    # then guard the specific endpoints:
    # location /api/ingest/ {
    #     limit_req zone=ingest burst=20 nodelay;
    #     proxy_pass http://127.0.0.1:8090;
    # }
}

# ---- HTTPS :443 — panel (autogestión) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name panel.staging.tours.andescode.com.ar;

    # Same single SAN cert as web.
    ssl_certificate     /etc/letsencrypt/live/staging.tours.andescode.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.tours.andescode.com.ar/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8091; # panel container loopback bind
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # SSE route — NOT active until phase 2 (see note in the web block above).
    # location /api/stream/ {
    #     proxy_pass http://127.0.0.1:8091;
    #     proxy_http_version 1.1;
    #     proxy_set_header Connection '';
    #     proxy_buffering off;
    #     proxy_cache off;
    #     proxy_read_timeout 3600s;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Edge rate-limit — DEFERRED (future milestone; see note in the web block above).
    # location /api/ingest/ {
    #     limit_req zone=ingest burst=20 nodelay;
    #     proxy_pass http://127.0.0.1:8091;
    # }
}
