packages:
  - "apps/*"
  - "packages/*"
# Build-script allowlist (pnpm 11.6). esbuild: transitive dep of vitest/tsx/tsup.
# sharp: Next 16's native image optimizer. Both are well-known, approved packages.
# @prisma/client + better-sqlite3: dev-only transitive deps of @better-auth/cli,
# used ONLY for the offline `generate` step (no runtime, no DB driver) — their
# native builds are intentionally NOT run (false), so pnpm stops flagging them.
# pnpm 11.6 honors the allowBuilds map; the legacy onlyBuiltDependencies array is
# not read by this version (it left builds ignored and rewrote a stub on install).
allowBuilds:
  '@prisma/client': false
  better-sqlite3: false
  esbuild: true
  sharp: true
# Resolution fix: @better-auth/core@1.6.18 declares a peer of better-call@1.3.6
# (which exports kAPIErrorHeaderSymbol). When @better-auth/cli@1.4.21 (1.4.x line,
# FLAG-1) and the runtime better-auth@1.6.18 share one tree, pnpm linked one
# @better-auth/core@1.6.18 instance against the CLI subtree's older better-call@1.1.8,
# which lacks that export — crashing `better-auth generate` (Pitfall 3 made real).
# Force better-call to 1.3.6 everywhere so core 1.6.18 always gets its declared peer.
# Dev-time only (the offline generator); the shipped runtime already resolves 1.3.6.
overrides:
  better-call: 1.3.6
